name: Deploy Site to GitHub Pages

on:
  workflow_dispatch:
  # Opsi: trigger setelah workflow ebook berhasil jika aman
  # workflow_run:
  #   workflows: ["DIL Ebook Agent Run"]
  #   types:
  #     - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Site
        run: |
          cd src/exporters
          python site_builder.py

      - name: Validate Site
        run: |
          cd src/validators
          python website_validator.py

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
