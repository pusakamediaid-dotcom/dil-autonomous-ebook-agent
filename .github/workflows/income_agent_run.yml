name: DIL Income Agent Run

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      income_mode:
        description: 'Income agent mode'
        required: true
        default: 'affiliate_research'
        type: choice
        options:
          - affiliate_research
          - affiliate_content
          - affiliate_publish_plan
          - news_research
          - news_content
          - news_publish_plan
          - income_report
      niche:
        description: 'Target niche'
        required: false
        type: string
        default: ''
      target_audience:
        description: 'Target audience'
        required: false
        type: string
        default: ''
      platform:
        description: 'Target platform'
        required: false
        type: choice
        options:
          - tokopedia
          - threads
          - google
          - blog
          - manual
        default: 'manual'
      topic:
        description: 'News topic (for news modes)'
        required: false
        type: string
        default: ''
      content_brief:
        description: 'Content brief'
        required: false
        type: string
        default: ''
      approval:
        description: 'Approval given'
        required: false
        type: boolean
        default: false

jobs:
  income-agent:
    name: Income Agent
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue && (
        contains(github.event.issue.labels.*.name, 'income-agent-run')
      ))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Validate Python syntax
        run: |
          echo "=== Validating Python files ==="
          python -m py_compile src/core/*.py src/agents/*.py src/validators/*.py src/generator.py src/income_generator.py
          if [ $? -eq 0 ]; then
            echo "All Python files valid"
          else
            echo "Python validation failed"
            exit 1
          fi

      - name: Run Income Generator
        run: |
          python src/income_generator.py
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          GITHUB_ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          GITHUB_ISSUE_BODY: ${{ github.event.issue.body || '' }}
          INPUT_INCOME_MODE: ${{ inputs.income_mode || '' }}
          INPUT_MODE: ${{ inputs.income_mode || '' }}
          INPUT_NICHE: ${{ inputs.niche || '' }}
          INPUT_TARGET_AUDIENCE: ${{ inputs.target_audience || '' }}
          INPUT_PLATFORM: ${{ inputs.platform || 'manual' }}
          INPUT_TOPIC: ${{ inputs.topic || '' }}
          INPUT_CONTENT_BRIEF: ${{ inputs.content_brief || '' }}
          INPUT_APPROVAL: ${{ inputs.approval && 'true' || 'false' }}
          PROVIDER_1_API_KEY: ${{ secrets.PROVIDER_1_API_KEY }}
          PROVIDER_2_API_KEY: ${{ secrets.PROVIDER_2_API_KEY }}
          PROVIDER_3_API_KEY: ${{ secrets.PROVIDER_3_API_KEY }}
          PROVIDER_4_API_KEY: ${{ secrets.PROVIDER_4_API_KEY }}
          PROVIDER_5_API_KEY: ${{ secrets.PROVIDER_5_API_KEY }}
          TOKOPEDIA_AFFILIATE_ID: ${{ secrets.TOKOPEDIA_AFFILIATE_ID }}
          TOKOPEDIA_API_KEY: ${{ secrets.TOKOPEDIA_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          SOCIAL_POSTING_API_KEY: ${{ secrets.SOCIAL_POSTING_API_KEY }}

      - name: Display output files
        run: |
          echo "=== Generated Output Files ==="
          if [ -d output ]; then
            find output -type f \( -name "*.md" -o -name "*.json" -o -name "*.txt" \) 2>/dev/null | head -30
          else
            echo "No output directory found"
          fi

      - name: Upload affiliate artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: affiliate-output
          path: output/affiliate/
          retention-days: 30

      - name: Upload news artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: news-output
          path: output/news/
          retention-days: 30

      - name: Upload publishing artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: publishing-output
          path: output/publishing/
          retention-days: 30

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: income-reports
          path: |
            output/run_report.json
            output/cost_report.json
            output/error_log.txt
            output/income_report.json
          retention-days: 30
