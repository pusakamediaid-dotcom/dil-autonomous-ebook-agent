name: DIL Ebook Agent Run

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode (planning/test/production)'
        required: false
        default: 'test'
        type: choice
        options:
          - planning
          - test
          - production
      ebook_title:
        description: 'Ebook title override'
        required: false
        type: string
      target_audience:
        description: 'Target audience'
        required: false
        type: string
      reading_level:
        description: 'Reading level'
        required: false
        type: string
        default: 'intermediate'

jobs:
  generate-ebook:
    name: Generate Ebook
    runs-on: ubuntu-latest
    
    # Only run when issue has specific labels
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue && contains(github.event.issue.labels.*.name, 'agent-run')) ||
      (github.event.issue && contains(github.event.issue.labels.*.name, 'generate-ebook'))
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: Set up environment variables from GitHub Secrets
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          GITHUB_ISSUE_TITLE: ${{ github.event.issue.title || inputs.ebook_title || '' }}
          GITHUB_ISSUE_BODY: ${{ github.event.issue.body || '' }}
          PROVIDER_1_API_KEY: ${{ secrets.PROVIDER_1_API_KEY }}
          PROVIDER_2_API_KEY: ${{ secrets.PROVIDER_2_API_KEY }}
          PROVIDER_3_API_KEY: ${{ secrets.PROVIDER_3_API_KEY }}
          PROVIDER_4_API_KEY: ${{ secrets.PROVIDER_4_API_KEY }}
          PROVIDER_5_API_KEY: ${{ secrets.PROVIDER_5_API_KEY }}
      
      - name: Run Ebook Generator
        run: |
          python src/generator.py
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          GITHUB_ISSUE_TITLE: ${{ github.event.issue.title || inputs.ebook_title || '' }}
          GITHUB_ISSUE_BODY: ${{ github.event.issue.body || '' }}
          PROVIDER_1_API_KEY: ${{ secrets.PROVIDER_1_API_KEY }}
          PROVIDER_2_API_KEY: ${{ secrets.PROVIDER_2_API_KEY }}
          PROVIDER_3_API_KEY: ${{ secrets.PROVIDER_3_API_KEY }}
          PROVIDER_4_API_KEY: ${{ secrets.PROVIDER_4_API_KEY }}
          PROVIDER_5_API_KEY: ${{ secrets.PROVIDER_5_API_KEY }}
      
      - name: Display output files
        run: |
          echo "=== Generated Output Files ==="
          find output -type f -name "*.md" -o -name "*.json" | head -20
      
      - name: Upload task plan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-plan
          path: output/task_plan.json
          retention-days: 30
      
      - name: Upload outline artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outline
          path: output/outline.json
          retention-days: 30
      
      - name: Upload ebook artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ebook
          path: output/ebook.md
          retention-days: 30
      
      - name: Upload run report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-report
          path: output/run_report.json
          retention-days: 30
      
      - name: Upload cost report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cost-report
          path: output/cost_report.json
          retention-days: 30
      
      - name: Upload error log artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: error-log
          path: output/error_log.txt
          retention-days: 30
      
      - name: Upload memory context artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: memory-context
          path: output/memory_context.json
          retention-days: 30
      
      - name: Upload routing decision artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: routing-decision
          path: output/routing_decision.json
          retention-days: 30
      
      - name: Add comment to issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runReport = JSON.parse(fs.readFileSync('output/run_report.json', 'utf8'));
            
            const comment = `
            ## 📚 Ebook Generation Complete
            
            **Status:** ${runReport.status}
            **Mode:** ${runReport.mode}
            **Issue:** #${runReport.issue_number}
            
            ### Execution Summary
            - Agents Executed: ${runReport.execution.agents_executed.length}
            - Agents Failed: ${runReport.execution.agents_failed.length}
            
            ### Cost Summary
            - Total Tokens: ${runReport.summary.total_tokens_used}
            - Total Cost: $${runReport.summary.total_cost_usd}
            
            ### Artifacts
            - 📄 [ebook.md](artifact:ebook)
            - 📋 [task_plan.json](artifact:task-plan)
            - 📑 [outline.json](artifact:outline)
            - 📊 [run_report.json](artifact:run-report)
            - 💰 [cost_report.json](artifact:cost-report)
            
            *Generated at: ${runReport.generated_at}*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          result-encoding: string