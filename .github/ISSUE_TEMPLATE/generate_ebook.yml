name: Generate Ebook
description: Create a new technical ebook using the DIL Ebook Agent
title: "[EBOOK] "
labels: ["generate-ebook"]
body:
  - type: markdown
    attributes:
      value: |
        ## Ebook Generation Request
        
        Isi formulir di bawah ini untuk memulai proses pembuatan ebook.
        
        Mode tersedia:
        - planning: Hanya membuat rencana dan estimasi biaya
        - test: Membuat 1 bab pendek untuk validasi
        - session: Membuat 3-4 bab untuk satu sesi produksi
        - review: Mengecek output yang sudah ada
        - repair: Memperbaiki output yang gagal
        
        Mode full belum dibuka untuk umum.

  - type: input
    id: ebook_title
    attributes:
      label: Judul Ebook
      description: Judul buku elektronik yang ingin dibuat
      placeholder: "Contoh: Panduan Dasar AI untuk Membuat Ebook Premium"
    validations:
      required: true

  - type: input
    id: target_audience
    attributes:
      label: Target Pembaca
      description: Siapa target pembaca ebook ini
      placeholder: "Contoh: Pemula, penjual produk digital, kreator ebook, pelajar, mahasiswa"
    validations:
      required: true

  - type: dropdown
    id: reading_level
    attributes:
      label: Level Pembaca
      description: Tingkat kesulitan konten
      options:
        - beginner
        - intermediate
        - advanced
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode Produksi
      description: Mode eksekusi generasi ebook
      options:
        - planning
        - test
        - session
        - review
        - repair
    validations:
      required: true

  - type: number
    id: total_chapters
    attributes:
      label: Jumlah Bab
      description: Berapa bab yang diinginkan
      placeholder: "1-20"
      min: 1
      max: 20
    validations:
      required: true

  - type: number
    id: target_pages
    attributes:
      label: Target Halaman
      description: Estimasi jumlah halaman (opsional)
      placeholder: "20-200"
      min: 1
      max: 500

  - type: number
    id: session_number
    attributes:
      label: Nomor Sesi
      description: Nomor sesi jika mode session (1-4)
      placeholder: "1"
      min: 1
      max: 4

  - type: textarea
    id: content_brief
    attributes:
      label: Brief Konten
      description: Ringkasan singkat isi ebook yang diinginkan
      placeholder: |
        Jelaskan topik utama, scope, dan fokus ebook.
        
        Contoh:
        Ebook ini mengajarkan cara memahami AI sebagai alat bantu produksi ebook digital.
        Fokus pada alur kerja dari ide, riset, outline, penulisan, review, hingga persiapan file jualan.
        Bahasa harus mudah dipahami pemula dan praktis.
    validations:
      required: true

  - type: textarea
    id: special_instructions
    attributes:
      label: Aturan Khusus
      description: Instruksi khusus atau preferensi konten (opsional)
      placeholder: |
        Contoh:
        - Gunakan Bahasa Indonesia rapi
        - Hindari teori terlalu panjang
        - Berikan contoh nyata
        - Setiap subbab wajib punya Metode 5-Lapis

  - type: dropdown
    id: api_preference
    attributes:
      label: Preferensi API Provider
      description: Provider AI yang disukai (kosongkan untuk auto-select)
      options:
        - auto
        - provider_1
        - provider_2
        - provider_3
        - provider_4
        - provider_5
    validations:
      required: false

  - type: confirm
    id: approval_given
    attributes:
      label: Approval untuk eksekusi
      description: Centang untuk mengkonfirmasi persetujuan generasi
      value: false
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Checklist Sebelum Submit
        
        - [ ] Judul ebook sudah jelas dan spesifik
        - [ ] Target pembaca sudah teridentifikasi
        - [ ] Level pembaca sesuai dengan konten
        - [ ] Brief konten cukup detail
        - [ ] Mode yang dipilih sudah tepat
        - [ ] Approval sudah diberikan
        
        ## Catatan Penting
        
        - Mode test: 1 bab pendek untuk validasi (biaya minimal)
        - Mode session: 3-4 bab untuk satu sesi produksi
        - Mode full: Belum dibuka untuk umum
        - Semua API memiliki kuota dan biaya masing-masing
        - Tidak ada klaim gratis tanpa limit