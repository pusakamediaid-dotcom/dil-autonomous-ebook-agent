name: DIL Ebook Agent Run

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: true
        default: 'test'
        type: choice
        options:
          - planning
          - test
          - session
          - review
          - repair
      ebook_title:
        description: 'Ebook title'
        required: false
        type: string
      target_audience:
        description: 'Target audience'
        required: false
        type: string
      reading_level:
        description: 'Reading level'
        required: false
        type: string
        default: 'intermediate'
      total_chapters:
        description: 'Number of chapters'
        required: false
        type: string
        default: '1'
      target_pages:
        description: 'Target pages (optional)'
        required: false
        type: string
        default: ''
      session_number:
        description: 'Session number (1-4)'
        required: false
        type: string
        default: ''
      content_brief:
        description: 'Content brief'
        required: false
        type: string
        default: ''
      special_instructions:
        description: 'Special instructions'
        required: false
        type: string
        default: ''
      api_preference:
        description: 'API provider preference'
        required: false
        type: string
        default: 'auto'
      approval:
        description: 'Approval given'
        required: false
        type: boolean
        default: false

jobs:
  generate-ebook:
    name: Generate Ebook
    runs-on: ubuntu-latest
    
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue && (
        contains(github.event.issue.labels.*.name, 'agent-run') ||
        contains(github.event.issue.labels.*.name, 'generate-ebook')
      ))
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: Validate Python syntax
        run: |
          echo "=== Validating Python files ==="
          python -m py_compile src/core/*.py src/agents/*.py src/validators/*.py src/generator.py
          if [ $? -eq 0 ]; then
            echo "All Python files valid"
          else
            echo "Python validation failed"
            exit 1
          fi
      
      - name: Run Ebook Generator
        run: |
          python src/generator.py
        env:
          # GitHub context
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          GITHUB_ISSUE_TITLE: ${{ github.event.issue.title || inputs.ebook_title || '' }}
          GITHUB_ISSUE_BODY: ${{ github.event.issue.body || '' }}
          
          # Workflow dispatch inputs
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_EBOOK_TITLE: ${{ inputs.ebook_title || '' }}
          INPUT_TARGET_AUDIENCE: ${{ inputs.target_audience || '' }}
          INPUT_READING_LEVEL: ${{ inputs.reading_level || 'intermediate' }}
          INPUT_TOTAL_CHAPTERS: ${{ inputs.total_chapters || '1' }}
          INPUT_TARGET_PAGES: ${{ inputs.target_pages || '' }}
          INPUT_SESSION_NUMBER: ${{ inputs.session_number || '' }}
          INPUT_CONTENT_BRIEF: ${{ inputs.content_brief || '' }}
          INPUT_SPECIAL_INSTRUCTIONS: ${{ inputs.special_instructions || '' }}
          INPUT_API_PREFERENCE: ${{ inputs.api_preference || 'auto' }}
          INPUT_APPROVAL: ${{ inputs.approval && 'true' || 'false' }}
          
          # API Keys from Secrets
          PROVIDER_1_API_KEY: ${{ secrets.PROVIDER_1_API_KEY }}
          PROVIDER_2_API_KEY: ${{ secrets.PROVIDER_2_API_KEY }}
          PROVIDER_3_API_KEY: ${{ secrets.PROVIDER_3_API_KEY }}
          PROVIDER_4_API_KEY: ${{ secrets.PROVIDER_4_API_KEY }}
          PROVIDER_5_API_KEY: ${{ secrets.PROVIDER_5_API_KEY }}
      
      - name: Display output files
        run: |
          echo "=== Generated Output Files ==="
          if [ -d output ]; then
            find output -type f -name "*.md" -o -name "*.json" -o -name "*.txt" 2>/dev/null | head -20
          else
            echo "No output directory found"
          fi
      
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ebook-output
          path: output/
          retention-days: 30
      
      - name: Create GitHub Issue Comment
        if: github.event_name == 'issues'
        run: |
          echo "=== Creating Issue Comment ==="
          
          # Check if run_report.json exists
          if [ -f output/run_report.json ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('output/run_report.json')).get('status', 'UNKNOWN'))")
            MODE=$(python3 -c "import json; print(json.load(open('output/run_report.json')).get('mode', 'UNKNOWN'))")
            AGENTS=$(python3 -c "import json; r=json.load(open('output/run_report.json')); print(len(r.get('execution', {}).get('agents_executed', [])))")
            FAILED=$(python3 -c "import json; r=json.load(open('output/run_report.json')); print(len(r.get('execution', {}).get('agents_failed', [])))")
            COST=$(python3 -c "import json; print(json.load(open('output/run_report.json')).get('summary', {}).get('total_cost_usd', 0))")
            
            # Check fallback info
            FALLBACK_USED="false"
            FALLBACK_REASON=""
            if [ -f output/fallback_info.json ]; then
              FALLBACK_USED=$(python3 -c "import json; print(json.load(open('output/fallback_info.json')).get('fallback_used', 'false'))")
              FALLBACK_REASON=$(python3 -c "import json; print(json.load(open('output/fallback_info.json')).get('fallback_reason', ''))")
            fi
            
            COMMENT="Ebook generation completed.

Status: ${STATUS}
Mode: ${MODE}
Agents executed: ${AGENTS}
Agents failed: ${FAILED}
Total cost: $${COST}"

if [ "${FALLBACK_USED}" = "True" ]; then
  COMMENT="${COMMENT}

Fallback used: Yes
Reason: ${FALLBACK_REASON}"
fi

COMMENT="${COMMENT}

Artifacts available in Actions run."
          else
            COMMENT="Ebook generation failed or no output produced. Check Actions logs for details."
          fi
          
          echo "${COMMENT}" > comment.txt
          
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -d "{\"body\": \"$(cat comment.txt)\"}"
        shell: bash