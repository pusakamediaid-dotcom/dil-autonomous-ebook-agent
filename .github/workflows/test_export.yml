name: Test Export

on:
  workflow_dispatch:

jobs:
  test-export:
    runs-on: ubuntu-latest
    name: Test Website Export & PDF Fallback

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Site Builder
        run: |
          cd src/exporters
          python site_builder.py

      - name: Run PDF Exporter (best-effort)
        run: |
          cd src/exporters
          python pdf_exporter.py

      - name: Run Website Validator
        run: |
          cd src/validators
          python website_validator.py

      - name: Run PDF Validator
        run: |
          cd src/validators
          python pdf_validator.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-export-artifacts
          path: |
            site/
            output/
            samples/
